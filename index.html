<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TissyFlix / Projeto Imersão</title>
    <link rel="icon" type="image/x-icon" href="assets/imagens/redketchup/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/imagens/redketchup/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/imagens/redketchup/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/imagens/redketchup/apple-touch-icon.png">
    <link rel="manifest" href="assets/imagens/redketchup/site.webmanifest">
    <meta name="theme-color" content="#E50914">

    <meta name="description"
        content="Clone da interface da Netflix desenvolvido como projeto de estudo durante a Imersão Alura - Front-End na Era da IA.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="TissyFlix / Projeto Imersão">
    <meta property="og:description"
        content="Clone da interface da Netflix desenvolvido como projeto de estudo e portfólio durante a Imersão Alura.">
    <meta property="og:image" content="https://tissyflix-dev.vercel.app/assets/imagens/capa-final.jpg">
    <meta property="og:url" content="https://tissyflix-dev.vercel.app/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TissyFlix / Projeto Imersão">
    <meta name="twitter:description" content="Clone da Netflix - Projeto de estudo com HTML, CSS e JavaScript.">
    <meta name="twitter:image" content="https://tissyflix-dev.vercel.app/assets/imagens/capa-final.jpg">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loading.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <script src="loading.js"></script>
</head>
<body>
    <!-- Logo Netflix -->
    <div class="netflix-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" width="200" height="54">
    </div>

    <!-- Botão para alternar entre Dark e Light Mode -->
    <button id="theme-toggle" aria-label="Alternar tema">
        <i id="theme-icon" class="fas fa-sun"></i>
    </button>

    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section  aria-label="Perfis de usuário">
            <nav class="profiles">
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil_1.png" alt="Uma ilustração 3D de Snowball de 'A Vida Secreta dos Bichos' como líder tático em uma cidade pós-apocalíptica." width="150" height="150">
                        <figcaption>Silva</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil_2.png" alt="Uma ilustração 3D de Billy Butcher do The Boys sorrindo, com um fundo distópico e detalhes icônicos da série." width="150" height="150">
                        <figcaption>Guilherme</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil_3.png"
                            alt="Ilustração 3D da Barbie sorrindo, com cabelos loiros e vestido rosa, em um quarto decorado em tons de rosa e azul." width="150" height="150">
                        <figcaption>Vick</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil_4.png"
                            alt="Ilustração 3D de uma jovem de cabelo rosa e terno preto com uma flor branca na lapela, entre luzes neon azul e vermelha." width="150" height="150">
                        <figcaption>Tissiany</figcaption>
                    </figure>
                </a>

                <!-- Botão Adicionar Perfil -->
                <div class="profile add-profile">
                    <figure>
                        <div class="add-profile-icon">
                            <span>+</span>
                        </div>
                        <figcaption>Adicionar perfil</figcaption>
                    </figure>
                </div>
            </nav>

            <!-- Botão Gerenciar Perfis -->
            <button class="manage-profiles">Gerenciar perfis</button>
        </section>
    </main>

    <!-- Footer com info do projeto -->
    <footer class="footer">
        <p>Projeto <a href="https://www.alura.com.br/imersao" target="_blank">Imersão Alura</a> · Desenvolvido por <a href="https://github.com/TissianyDelmiro" target="_blank" class="highlight"><i class="fab fa-github"></i> Tissiany Delmiro</a> · © 2026</p>
    </footer>

    <!-- Modal Criar Perfil -->
    <div class="modal-imersao" id="modal-criar-perfil">
        <div class="modal-imersao-backdrop" id="modal-criar-close"></div>
        <div class="modal-imersao-content modal-criar-content">
            <button class="modal-imersao-x" id="modal-criar-x">&times;</button>
            <h2 class="modal-criar-titulo">Adicionar perfil</h2>
            <p class="modal-criar-sub">Adicione um perfil para outra pessoa que usa a TissyFlix.</p>
            <div class="modal-imersao-divider"></div>
            <div class="modal-criar-avatares">
                <p class="modal-criar-label">Escolha um avatar</p>
                <div class="modal-avatar-grid" id="modal-avatar-grid">
                    <img src="assets/Gemini_1.png" alt="Avatar 1" class="modal-avatar" data-avatar="assets/Gemini_1.png">
                    <img src="assets/Gemini_2.png" alt="Avatar 2" class="modal-avatar" data-avatar="assets/Gemini_2.png">
                    <img src="assets/Gemini_3.png" alt="Avatar 3" class="modal-avatar" data-avatar="assets/Gemini_3.png">
                    <img src="assets/Gemini_4.png" alt="Avatar 4" class="modal-avatar" data-avatar="assets/Gemini_4.png">
                </div>
            </div>
            <div class="modal-criar-nome">
                <input type="text" id="input-nome-perfil" class="modal-criar-input" placeholder="Nome do perfil" maxlength="15">
            </div>
            <div class="modal-criar-botoes">
                <button class="modal-btn-github" id="btn-salvar-perfil">Continuar</button>
                <button class="modal-btn-alura" id="btn-cancelar-perfil">Cancelar</button>
            </div>
            <p class="modal-criar-erro" id="modal-criar-erro"></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/index.js"></script>
    <script src="script.js"></script>
</body>
</html>
